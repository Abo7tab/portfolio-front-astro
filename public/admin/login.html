<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/admin/css/admin-theme.css" rel="stylesheet">
</head>

<body class="d-flex align-items-center justify-content-center vh-100">

    <div class="card p-4" style="max-width: 400px; width: 100%;">
        <div class="text-center mb-4">
            <h2 class="mb-1" style="color: var(--accent-cyan);">Portfolio Admin</h2>
            <p class="text-muted">Sign in to manage your site</p>
        </div>
        <form id="loginForm">
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" class="form-control" id="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">Login</button>
            <div id="error-msg" class="text-danger mt-3 text-center" style="display:none;"></div>
        </form>
    </div>

    <script src="/admin/js/api.js?v=2.0"></script>
    <script src="/admin/js/auth.js?v=2.0"></script>
    <script src="/admin/js/spinner.js?v=1.0"></script>
    <script>
        checkGuest(); // Redirect to dashboard if already logged in

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('error-msg');

            await wrapSubmit(btn, async () => {
                try {
                    await API.login(email, password);
                    window.location.href = 'index.html';
                } catch (error) {
                    console.error(error);
                    errorMsg.innerHTML = `<strong>Error:</strong> ${error.message}<br><small>Check console for details.</small>`;
                    errorMsg.style.display = 'block';
                }
            });
        });
    </script>
</body>

</html>
