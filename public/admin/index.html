<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Admin Dashboard for Portfolio Management">
    <title>Admin Dashboard - Portfolio</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.5.0/fonts/remixicon.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="css/admin-theme.css" rel="stylesheet">
</head>

<body>

    <div class="d-flex">
        <!-- Sidebar -->
        <div class="sidebar d-flex flex-column flex-shrink-0 p-3" style="width: 250px;">
            <a href="/" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-white text-decoration-none">
                <span class="fs-4">Portfolio Admin</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="#" class="nav-link active" data-page="home">
                        <i class="ri-dashboard-line me-2"></i> Dashboard
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="projects">
                        <i class="ri-folder-line me-2"></i> Projects
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="skills">
                        <i class="ri-tools-line me-2"></i> Skills
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="certificates">
                        <i class="ri-award-line me-2"></i> Certificates
                    </a>
                </li>
                <li>
                    <a href="#" class="nav-link" data-page="profile">
                        <i class="ri-user-line me-2"></i> Profile & Socials
                    </a>
                </li>
            </ul>
            <hr>
            <div class="dropdown">
                <a href="#" class="d-flex align-items-center text-white text-decoration-none dropdown-toggle"
                    id="dropdownUser1" data-bs-toggle="dropdown" aria-expanded="false">
                    <i class="ri-admin-line me-2"></i> Admin
                </a>
                <ul class="dropdown-menu dropdown-menu-dark text-small shadow" aria-labelledby="dropdownUser1">
                    <li><a class="dropdown-item" href="#" id="logoutBtn">Sign out</a></li>
                </ul>
            </div>
        </div>

        <!-- Main Content -->
        <div class="flex-grow-1 p-4">
            <div class="content" id="main-content">
                <!-- Content Injected Here -->
                <h2>Welcome to Dashboard</h2>
                <p>Select a section from the sidebar to manage content.</p>
            </div>
        </div>
    </div>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script> <!-- For nice alerts -->
    <script src="js/api.js?v=2.0"></script>
    <script src="js/auth.js?v=2.0"></script>
    <script src="js/spinner.js?v=1.0"></script>
    <script src="js/dashboard-v4.js"></script>
</body>

</html>
